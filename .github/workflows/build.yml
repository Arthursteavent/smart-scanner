name: Build Smart Scanner

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "SmartScanner" --add-data "config.json:." --add-data "core/keywords.json:core" main.py

      - name: Create Mac DMG
        run: |
          STAGE="$(mktemp -d)/dmg"
          mkdir -p "$STAGE"
          cp -R "dist/SmartScanner.app" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "SmartScanner" -srcfolder "$STAGE" -ov -format UDZO "dist/SmartScanner.dmg"
          
      - name: Upload Mac Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartScanner-Mac
          path: dist/SmartScanner.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "SmartScanner" --add-data "config.json;." --add-data "core/keywords.json;core" main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartScanner-Windows
          path: dist/SmartScanner
